# ==============================================================================
# Tmux Configuration
# ==============================================================================
# Main configuration file for tmux - Terminal Multiplexer
# User customizations and overrides should be placed in ~/.tmux.conf.local
#
# Key Features:
#   - Vi-style keybindings
#   - Sensible defaults for modern tmux (2.4+)
#   - Tokyo Night color scheme integration via plugins
#   - Mouse support with toggle
#   - Session persistence with tmux-resurrect
#
# Prefix Key: C-j (configured in .tmux.conf.local)

# ==============================================================================
# General Options
# ==============================================================================
# Use vi key bindings in copy mode and command prompt
set -g mode-keys vi

# Start window and pane numbering at 1 (0 is too far from 1)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 500

# Allow escape sequences to change window name
set -g allow-rename on

# Faster command sequences (no delay after ESC)
set -s escape-time 0

# Pass focus events to applications running in tmux
set -g focus-events on

# Increase repeat timeout for repeatable commands
set -sg repeat-time 600

# ==============================================================================
# Display Options
# ==============================================================================
# Set default terminal mode for proper colors
set -g default-terminal 'screen-256color'

# Status bar position
set -g status-position bottom

# Display pane indicators for longer
set -g display-panes-time 800

# Display status messages for longer
set -g display-time 1000

# Refresh status bar every 10 seconds
set -g status-interval 10

# Disable automatic window renaming
setw -g automatic-rename off

# Disable automatic terminal title setting
set -g set-titles off

# ==============================================================================
# Activity & Bell Options
# ==============================================================================
# Disable all activity and bell notifications
set -g bell-action none
set -g monitor-activity off
set -g monitor-bell off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# ==============================================================================
# History Configuration
# ==============================================================================
# Set location for command history file
set -g history-file ~/._tmux-history

# ==============================================================================
# Key Bindings - Window & Pane Splits
# ==============================================================================
# Split current window horizontally
bind - split-window -v
# Split current window vertically
bind _ split-window -h

# ==============================================================================
# Key Bindings - Pane Navigation
# ==============================================================================
# Move between panes with h/j/k/l
bind -r h select-pane -L  # Move left
bind -r j select-pane -D  # Move down
bind -r k select-pane -U  # Move up
bind -r l select-pane -R  # Move right

# Swap panes
bind > swap-pane -D       # Swap with next pane
bind < swap-pane -U       # Swap with previous pane

# ==============================================================================
# Key Bindings - Pane Resizing
# ==============================================================================
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# ==============================================================================
# Key Bindings - Window Navigation
# ==============================================================================
unbind n
unbind p
bind -r C-h previous-window # Select previous window
bind -r C-l next-window     # Select next window
bind Tab last-window        # Move to last active window

# ==============================================================================
# Copy Mode Configuration
# ==============================================================================
# Enter copy mode with Enter key
bind Enter copy-mode

# Vi-style copy mode key bindings (for tmux >= 2.4)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# ==============================================================================
# Clipboard Integration
# ==============================================================================
# Automatically copy to system clipboard based on available tools
# Priority: xsel > xclip > pbcopy > clip.exe > /dev/clipboard

# Linux X11 clipboard (xsel preferred)
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'

# macOS clipboard
if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | pbcopy"'
if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | reattach-to-user-namespace pbcopy"'

# Windows WSL clipboard
if -b 'command -v clip.exe > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | clip.exe"'
if -b '[ -c /dev/clipboard ]' 'bind y run -b "tmux save-buffer - > /dev/clipboard"'

# ==============================================================================
# Buffer Management
# ==============================================================================
bind b list-buffers   # List all paste buffers
bind p paste-buffer   # Paste from the top buffer
bind P choose-buffer  # Interactive buffer selection

# ==============================================================================
# Local Configuration
# ==============================================================================
# Source user-specific overrides and customizations
# This file should contain:
#   - Custom key bindings
#   - Plugin configuration
#   - Theme settings (Tokyo Night)
#   - Personal preferences
source -q ~/.tmux.conf.local
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "tmux-python/tmuxp"
set -g @plugin "greymd/tmux-xpanes"
set -g @plugin "Morantron/tmux-fingers"
set -g @plugin "fcsonline/tmux-thumbs"
set -g @plugin "sainnhe/tmux-fzf"
