[tools]
# Core Runtime
node = "latest"

# NPM Packages
"npm:yaml-language-server" = "latest"
"npm:bash-language-server" = "latest"
"npm:copilot" = "latest"
"npm:gitlab-search" = "latest"
"npm:vscode-langservers-extracted" = "4.10.0"
"npm:@google/gemini-cli" = "0.29.5"

# Other Runtimes
python = "3.13"
ruby = "latest"
perl = "latest"
rust = "latest"

# Infrastructure & CLI
terraform = "latest"
terraform-ls = "latest"
terraform-lsp = "latest"
terraform-validator = "latest"
tflint = "latest"
packer = "latest"
make = "latest"
gh = "latest"
glab = "latest"
gopass = "latest"
"ubi:docker/docker-credential-helpers" = { version = "latest", matching = "pass", rename_exe = "docker-credential-pass" }

# Development Tools
"aqua:neovim/neovim" = "latest"
lua-language-server = "latest"
stylua = "latest"
tree-sitter = "latest"
shfmt = "latest"
yamllint = "latest"
yamlfmt = "latest"
markdownlint-cli2 = "latest"
marksman = "2026-02-08"
editorconfig-checker = "latest"
usage = "latest"

# Python Tools (via pipx)
uv = "latest"
pipx = "latest"
"pipx:pydocstyle" = "latest"
"pipx:yapf" = "latest"
"pipx:mdformat" = "latest"
"pipx:pyflakes" = "latest"
"pipx:rstcheck" = "latest"
"pipx:sphinx-lint" = "latest"
"pipx:flake8" = "latest"
"pipx:python-lsp-server" = "latest"
"pipx:autopep8" = "latest"
"pipx:pylint" = "latest"
"pipx:tldr" = "latest"
"pipx:pre-commit" = "4.5.1"
"pipx:ansible-lint" = "26.3.0"
black = "latest"

# Binaries (via ubi)
"ubi:alesbrelih/gitlab-ci-ls" = "latest"
"ubi:uros-5/jinja-lsp" = "latest"
"ubi:ogham/exa" = "latest"
"ubi:jesseduffield/lazygit" = "latest"

# Terminal Utilities
bat = "latest"
bat-extras = "latest"
fzf = "latest"
zoxide = "latest"
yq = "latest"
jq = "latest"
rg = "latest"
ripgrep = "latest"
fd = "latest"
gdu = "latest"
eza = "latest"
duf = "latest"
tmux = "latest"
glow = "latest"
lazydocker = "latest"
yarn = "latest"

[env]
_.source = '.env'

[settings]
always_keep_download = false
always_keep_install = false
preferred_backends node = core
plugin_autoupdate_last_check_duration = '1 week'
activate_aggressive = false
idiomatic_version_file_enable_tools = []
experimental = false
lockfile = false
